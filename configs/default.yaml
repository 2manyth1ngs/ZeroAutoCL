# ─────────────────────────────────────────────────────────────────────────────
# Paper-level forecasting configuration — tuned for RTX 4090 (24 GB).
#
# VRAM budget notes
# -----------------
# The dominant memory cost comes from temporal / cross-scale contrast, which
# build (B, T', T') similarity matrices.  With max_temporal_len=200 and
# B=32, each matrix is 32×200×200×4 = 5 MB — safe on any modern GPU.
# Without subsampling, T=3000 (crop_len) would create 32×3000×3000×4 = 1.1 GB
# per matrix, causing OOM on 24 GB cards after adding gradients + encoder
# activations.
#
# Instance contrast (time-pools to (B, D) first) is unaffected by T.
# ─────────────────────────────────────────────────────────────────────────────

seed_generation:
  # AutoCTS++-aligned budget (reference/AutoCTS_plusplus/exps/generate_seeds.py
  # uses ``sample_num=20`` as default — 20 clean + 40 noisy per task, total 60).
  # Our previous 200 was ~10× AutoCTS++'s clean-mode count and made paper-scale
  # runs impractical (~50+ hours on one GPU).
  #
  # Two-stage AutoCTS++ protocol, executed as THREE CLI invocations per task:
  #
  #   1. --mode noisy  --n_per_dataset 20  --seed 42     # deterministic init
  #   2. --mode noisy  --n_per_dataset 20  --randomise_init  --seed 43
  #   3. --mode clean  --n_per_dataset 20  --seed 44
  #
  # Yields 60 records per task × 8 source tasks = 480 total (matching AutoCTS++
  # paper scale).  Estimated wall-clock ~15-20 h on a single RTX 4090.
  n_per_dataset_noisy: 20   # per ``--mode noisy`` run (run twice → 40 total)
  n_per_dataset_clean: 20   # single ``--mode clean`` run
  n_per_dataset: 20         # backward-compat fallback when CLI doesn't pass it
  pretrain_epochs: 40       # fallback only (forecasting uses iter budgets)
  pretrain_lr: 0.001
  batch_size: 32
  max_input_length: 2000
  # Sliding-window crop length for seed generation and encoder grid search.
  # Shorter than _FORECAST_WINDOW_LEN (3000) to speed up Stage A/B ~3×.
  # Seed gen only needs relative ranking — shorter crops are an equal bias
  # across all candidates, preserving rank order.  1024 covers ~50% of the
  # 10-layer dilated CNN receptive field (2047), enough for mid-layer layers
  # to contribute meaningful gradients.  Phase 4 retrain still uses 3000.
  crop_len: 1024
  # Cap sequence length for temporal/cross-scale similarity matrices.
  # Keeps peak VRAM well under 24 GB even when temporal=True is sampled.
  max_temporal_len: 200

# Per-dataset training budget (Bug #003a).
#
# Forecasting datasets (ETT*) suffer from train→val→test distribution drift,
# so val-based early stopping is unreliable.  Instead we fix an iter budget
# matching TS2Vec's official recipe (hardware-independent).  When
# ``pretrain_iters`` is set, ``pretrain_epochs`` is ignored.
#
# Classification / anomaly datasets keep epoch-based training and use
# val-best checkpointing (val signal is reliable for them).
dataset_budgets:
  # ── Forecasting (target pool) ──────────────────────────────────────────────
  ETTh1:        { pretrain_iters: 600 }
  ETTm1:        { pretrain_iters: 600 }
  # ── Forecasting (source pool) ──────────────────────────────────────────────
  ETTh2:        { pretrain_iters: 600 }
  PEMS03:       { pretrain_iters: 600 }
  PEMS04:       { pretrain_iters: 600 }
  PEMS07:       { pretrain_iters: 600 }
  PEMS08:       { pretrain_iters: 600 }
  PEMS-BAY:     { pretrain_iters: 600 }
  ExchangeRate: { pretrain_iters: 600 }
  # ── Classification (iter-based for Stage A / B, epoch-based only in Phase 4) ─
  # SleepEEG has ~23k train samples vs Epilepsy's ~250; epoch-based budgets
  # cause 90× iteration disparity (Bug #006).  Iter-based budgets normalise
  # wall-clock cost across datasets.  Phase 4 (run_phase4_finalists_cls.py)
  # reads only pretrain_epochs and ignores pretrain_iters, so it still uses
  # epoch-based training with val-best checkpointing as intended.
  HAR:          { pretrain_iters: 600, pretrain_epochs: 40 }
  Epilepsy:     { pretrain_iters: 600, pretrain_epochs: 40 }
  SleepEEG:     { pretrain_iters: 600, pretrain_epochs: 40 }
  Gesture:      { pretrain_iters: 600, pretrain_epochs: 40 }
  NATOPS:       { pretrain_iters: 600, pretrain_epochs: 40 }
  # ── Anomaly detection (epoch-based) ──────────────────────────────────────
  Yahoo:        { pretrain_epochs: 40 }
  KPI:          { pretrain_epochs: 40 }

comparator:
  # Stage 1 (pretrain / noisy seeds) config.  See
  # search/pretrain_comparator.py for the full key reference.
  #
  # Values aligned with AutoCTS++ (random_search.py L28,29,41,538):
  #   batch_size=64, lr=1e-4, epochs=100, tolerance=3 (we allow patience=5
  #   because our valid sets are larger after the symmetric-pair injection).
  epochs: 100               # upper bound — real stop is triggered by ``patience``
  lr: 0.0001
  batch_size: 64
  hidden_dim: 128
  valid_gap_threshold: 0.02 # P0: gap used to split valid from train seeds
  patience: 5               # P0: epochs of non-improvement → early stop
  eval_every: 1             # P0: evaluate valid loss every N epochs
  # NOTE: ``curriculum_levels`` is deprecated (P0 removed the gap-magnitude
  # curriculum).  The curriculum now lives in the two-stage noisy→clean
  # protocol; the 'comparator_clean' block below configures stage 2.

# Stage 2 (fine-tune / clean seeds) config — only consulted by
# ``run_pretrain_comparator.py`` when ``--clean_seeds_path`` is supplied.
# Any key omitted here inherits from ``comparator:`` above; the defaults
# when this whole block is absent are ``lr := 0.1 × comparator.lr`` and
# ``epochs := comparator.epochs // 2``.
#
# comparator_clean:
#   lr: 1.0e-5
#   epochs: 100
#   patience: 8

zero_shot:
  n_candidates: 200000      # 200k pool — comparator forward is nearly free on 4090
  top_k: 30                 # 30 fully-trained finalists on the target
  tournament_rounds: 25     # +5 for tighter Swiss-system ranking

encoder_default:
  n_layers: 10
  hidden_dim: 64
  output_dim: 320

# ─────────────────────────────────────────────────────────────────────────────
# Plan B (CLAUDE_ADV.md §3.7) — two-stage decomposition of the joint search.
#
# Stage A : grid-search 36 encoders × |sources| under GGS_STRATEGY → top-K_enc
# Stage B : seed generation + comparator + zero-shot ranking, with the encoder
#           sub-space restricted to top-K_enc
# Phase 4 : Cartesian retrain (K_enc × top_k_strategies) on the target dataset
# ─────────────────────────────────────────────────────────────────────────────
two_stage_search:
  encoder_grid:
    enabled: true
    sources: [PEMS03, PEMS04, PEMS07, PEMS08, ExchangeRate, ETTm1]
    save_path: outputs/full_etth1_two_stage/encoder_grid.json
    top_k_enc: 3                # K_enc

  cl_strategy_search:
    n_per_dataset: 20           # mirrors seed_generation.n_per_dataset (AutoCTS++ default)
    n_candidates: 200000
    tournament_rounds: 25
    top_k_strategies: 5         # CL strategies kept per encoder

  # Phase 4: K_enc × top_k_strategies = 3×5 = 15 retrains.
  # CLAUDE_ADV.md §10.2 originally proposed 3000 iters, but the protocol
  # A/B test (outputs/test_protocol_ab/diff.txt) showed §10.1 alone +
  # 600 iters already reaches mean MSE 0.155 — close to the TS2Vec
  # reference. The 3000-iter budget is now optional and not the default
  # because its marginal gain is small relative to the 5× wall-clock cost.
  finalists:
    pretrain_iters: 600
    pretrain_lr: 0.001
    batch_size: 32              # tracks §10.1 crop_len=3000
