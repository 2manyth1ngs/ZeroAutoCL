# ─────────────────────────────────────────────────────────────────────────────
# Paper-level forecasting configuration — tuned for RTX 4090 (24 GB).
#
# VRAM budget notes
# -----------------
# The dominant memory cost comes from temporal / cross-scale contrast, which
# build (B, T', T') similarity matrices.  With max_temporal_len=200 and
# B=32, each matrix is 32×200×200×4 = 5 MB — safe on any modern GPU.
# Without subsampling, T=3000 (crop_len) would create 32×3000×3000×4 = 1.1 GB
# per matrix, causing OOM on 24 GB cards after adding gradients + encoder
# activations.
#
# Instance contrast (time-pools to (B, D) first) is unaffected by T.
# ─────────────────────────────────────────────────────────────────────────────

seed_generation:
  # Rev 2026-05-12 — noisy stage RE-INTRODUCED alongside hold-out-source
  # valid (see ``comparator.valid_sources`` below).  The previous removal
  # (P0 fix, 2026-04-29) blamed noisy labels for the BCE-stuck-at-ln(2)
  # plateau, but the actual bottleneck was pair count: 57 sub-tasks × ≤14
  # train seeds (after gap-split) ≈ 10k pairs total, far below the AutoCTS++
  # ~200-500k regime.  CLAUDE_ADV.md §12.5 had already verified noisy-vs-
  # clean Spearman ρ ≥ 0.9 on ETTh2, so the labels were fine — only the
  # quantity was missing.  Combined with the gap-split removal in
  # ``pretrain_comparator``, this configuration lifts per-task train pairs
  # from O(14²) to O((30+80)²) = 110² ≈ 12k pairs per (sub-task, stage),
  # roughly 50× the previous train-pool size.
  n_per_dataset: 30         # CLEAN candidates per (source × sub-task);
                            # full ``pretrain_iters`` budget per candidate.
  n_noisy_per_dataset: 80   # NOISY candidates per (source × sub-task);
                            # cheap ``noisy_pretrain_iters`` budget each.
                            # 0 disables the noisy stage (legacy behaviour).
  noisy_pretrain_iters: 100 # ~1/6 of the canonical 600-iter clean budget.
                            # Calibration: CLAUDE_ADV.md §12.5 showed 1-epoch
                            # (~131 iters) best-of-N already gives Spearman
                            # ρ=0.9 on ETTh2; 100 iters keeps that safety
                            # margin while being ~6× cheaper than clean.
  # Cross-source L-share pool size (AutoCTS++ generate_seeds.py L65-103
  # ``use_seed=True`` mechanism).  The first ``n_shared`` candidates per
  # source are sampled ONCE before the source loop and are identical
  # across every source; the remaining ``n_per_dataset - n_shared`` are
  # sampled fresh per source.  Each shared config thus appears in
  # (sources × sub-tasks) (task, perf) cells, giving the comparator's
  # task-feature head dense supervision on how the same config's rank
  # shifts across tasks — the signal needed for zero-shot generalisation.
  # AutoCTS++ uses 1:1 (sample_num shared + sample_num random); we mirror
  # that by default.  ``0`` disables L-share (independent per-source
  # pools, the pre-2026-04-30 behaviour).
  n_shared: 10
  pretrain_epochs: 40       # fallback only (forecasting uses iter budgets)
  pretrain_lr: 0.001
  batch_size: 32
  max_input_length: 2000
  # Sliding-window crop length for seed generation and encoder grid search.
  # Shorter than _FORECAST_WINDOW_LEN (3000) to speed up Stage A/B ~3×.
  # Seed gen only needs relative ranking — shorter crops are an equal bias
  # across all candidates, preserving rank order.  1024 covers ~50% of the
  # 10-layer dilated CNN receptive field (2047), enough for mid-layer layers
  # to contribute meaningful gradients.  Phase 4 retrain still uses 3000.
  crop_len: 1024
  # Cap sequence length for temporal/cross-scale similarity matrices.
  # Keeps peak VRAM well under 24 GB even when temporal=True is sampled.
  max_temporal_len: 200

# AutoCTS++ §3.2.4 task-enrichment knobs for forecasting source datasets.
# Two complementary axes:
#
#   • n_time_windows  — slice each source's full series into N non-overlapping
#                       temporal segments (each segment becomes its own
#                       sub-task with a fresh 80/20 train/val split).
#                       Each window costs one CL pre-training run, so total
#                       compute scales linearly.  Default 1 = no slicing.
#
#   • horizon_groups  — list of horizon sets used at downstream eval time.
#                       Each group emits its own seed record but shares the
#                       CL pre-train, so this axis is essentially free.
#                       null = single canonical [24,48,168,336,720] eval.
#
# Total sub-tasks per source = n_time_windows × len(horizon_groups).
# Total CL pre-trainings per source = n_time_windows × n_per_dataset
# (horizon groups reuse the trained encoder).
forecasting_task_variants:
  # P0 fix (2026-04-29): time-window and variable-subset slicing are now
  # ENABLED by default (3 each) so the comparator sees the same configs
  # ranked under multiple data slices.  This is the cheapest way to lift
  # the pair count from O(n_per_dataset²) to O((n_per_dataset × 9)²) per
  # source — roughly an order-of-magnitude more learning signal at the
  # cost of n_time_windows × n_variable_subsets more CL pretrain runs.
  n_time_windows: 3
  horizon_groups: null
  min_window_len: 1000        # skip slicing when window < this many timesteps

  # Variable-subsampling axis (mirrors AutoCTS++ dataset_slice.py rate buckets,
  # minus the adjacency-matrix reconstruction — ZeroAutoCL's dilated CNN
  # encoder doesn't consume adjacency).  Wide datasets (PEMS series, 170-883
  # vars) benefit most.  Narrow datasets (ETT in univariate mode = 1 raw var,
  # ExchangeRate = 8) silently skip subsampling when raw_var_count <
  # ``min_var_count``.  Per-source variable indices are deterministic (seeded
  # by ``--seed`` + base dataset name) so seed-gen and comparator pretrain
  # see identical sub-task definitions.
  n_variable_subsets: 3                # 1 = disabled; ≥2 enables subsampling
  var_size_rates: [0.25, 0.5, 0.75]    # fractional bucket centres
  min_var_count: 4                     # skip sources with fewer raw vars

  # Effective sub-task counts per source with the defaults above:
  #   • Wide  (PEMS series, 170–883 vars) : 3 × 3 = 9 sub-tasks
  #   • Narrow (ETT univariate, 1 var)    : 3 × 1 = 3 sub-tasks
  #     (variable subset axis silently disabled by min_var_count=4)
  #   • ExchangeRate (8 vars)             : 3 × 3 = 9 sub-tasks

# Per-dataset training budget (Bug #003a).
#
# Forecasting datasets (ETT*) suffer from train→val→test distribution drift,
# so val-based early stopping is unreliable.  Instead we fix an iter budget
# matching TS2Vec's official recipe (hardware-independent).  When
# ``pretrain_iters`` is set, ``pretrain_epochs`` is ignored.
#
# Classification / anomaly datasets keep epoch-based training and use
# val-best checkpointing (val signal is reliable for them).
dataset_budgets:
  # ─── CL-aligned forecasting pool (rev 2026-05-10) ────────────────────────
  # 3 targets + 9 sources = 12 datasets, mirroring AutoCTS++ §4.1.1's
  # "each task-feature cluster needs ≥2 representatives" heuristic while
  # restricting the source pool to the CL-forecasting community's standard
  # benchmark set (TS2Vec / CoST / TF-C / AutoCLS / SimMTM / PatchTST).
  #
  # Source domain split (sub-task counts after time/variable slicing):
  #   ETT family   (ETTh2, ETTm1, ETTm2)            : 3 + 9 + 9 = 21  (37%)
  #   Energy       (Solar-AL, 137 ch)               : 3 × 3       = 9  (16%)
  #   Transport    (traffic.csv, 862 ch)            : 3 × 3       = 9  (16%)
  #   Atmospheric  (AQShunyi / AQWanliu / AQGuanyuan): 3 × 1 × 3 = 9  (16%)
  #   Finance      (ExchangeRate, 8 ch)             : 3 × 3       = 9  (16%)
  #                                                              total 57
  #
  # Targets (NEVER pulled by run_generate_seeds — listed for documentation /
  # Phase-4 retraining only):
  #   • ETTh1        — ETT family target; same-domain neighbours ETTh2/m1/m2
  #   • Electricity  — energy target; same-domain neighbour Solar-AL +
  #                     scale-similar neighbours traffic / AQ
  #   • Weather      — climate/atmospheric target; same-domain neighbours
  #                     AQShunyi / AQWanliu / AQGuanyuan (Beijing PRSA)
  #
  # Drop list:
  #   • PEMS03/04/07/08, PEMS-BAY, METR-LA — graph-traffic datasets from the
  #     GNN-forecasting community; not in any CL-forecasting benchmark.
  #     Mixing them into seeds collapsed comparator preference onto
  #     hierarchical-contrast strategies that don't fit ETT/Electricity
  #     targets (mode collapse documented in
  #     full_etth1_autocts/phase4_results.json vs result/phase4_results.json).
  #   • ILI — total length 966 << encoder RF 2047, can't pretrain stably.
  # ─────────────────────────────────────────────────────────────────────────

  # ── Targets (3) — for Phase-4 retrain only, not seed-gen ─────────────────
  ETTh1:        { pretrain_iters: 600 }
  Electricity:  { pretrain_iters: 600 }
  Weather:      { pretrain_iters: 600 }

  # ── ETT-family sources (3) — univariate ETT (1 raw var), so the
  #    variable-subset axis is auto-bypassed by ``min_var_count: 4`` and we
  #    only need to tune ``n_time_windows``.  ETTh2 stays at the global
  #    default of 3 (window 17400/3=5800, safely above RF=2047).  ETTm1/m2
  #    have ~4× the series length (69680 vs 17400) so we boost to 9 windows
  #    (each 7742 timesteps) without dipping below RF.
  ETTh2:        { pretrain_iters: 600 }
  ETTm1:        { pretrain_iters: 600, n_time_windows: 9 }
  ETTm2:        { pretrain_iters: 600, n_time_windows: 9 }

  # ── Energy source (1) — 137 PV-plant channels, parallel sensors.
  #    Default 3×3 var subsetting at rates [0.25,0.5,0.75] gives 34/68/103
  #    plant subsets, all retain "many parallel solar farms" character.
  Solar:        { pretrain_iters: 600 }

  # ── Transport source (1) — 862 road-occupancy channels.  Default 3×3
  #    subsetting gives 215/431/646 sensor subsets, all retain "many
  #    parallel road sensors" character.  Window 17544/3=5848 safely > RF.
  traffic:      { pretrain_iters: 600 }

  # ── Atmospheric sources (3 Beijing PRSA stations) — 11 raw vars per
  #    station (6 pollutants + 5 meteorology).  Variable subsetting at 0.25
  #    rate would give 3-var subsets that risk dropping ALL meteorology OR
  #    ALL pollutants, destroying the pollutant×weather coupling that gives
  #    these datasets their characteristic dynamics.  Override
  #    ``n_variable_subsets: 1`` to keep the full 11 vars per sub-task.
  #    Window 35064/3=11688 — comfortably above RF.
  AQShunyi:     { pretrain_iters: 600, n_variable_subsets: 1 }
  AQWanliu:     { pretrain_iters: 600, n_variable_subsets: 1 }
  AQGuanyuan:   { pretrain_iters: 600, n_variable_subsets: 1 }

  # ── Finance source (1) — 8 currency pairs.  Default 3×3 subsetting gives
  #    2/4/6-currency baskets; the 2-currency floor is informationally
  #    thin but contributes minor seed signal and matches AutoCTS++ practice
  #    for narrow-source datasets.  Window 7588/3=2529 is just above RF
  #    (2047) — tight but functional.  Outlier values are handled by the
  #    StandardScaler in ``_load_exchange_rate``.
  ExchangeRate: { pretrain_iters: 600 }
  # ── Legacy / unused (kept here as documentation of the failed 2026-04
  #    12-source experiment that triggered the rev to this CL-aligned pool):
  #    PEMS03/04/07/08, PEMS-BAY, METR-LA, ILI.  Loaders still exist in
  #    data/dataset.py for backwards compatibility but these are NOT in the
  #    default seed-generation source list.
  # ── Classification (iter-based for Stage A / B, epoch-based only in Phase 4) ─
  # SleepEEG has ~23k train samples vs Epilepsy's ~250; epoch-based budgets
  # cause 90× iteration disparity (Bug #006).  Iter-based budgets normalise
  # wall-clock cost across datasets.  Phase 4 (run_phase4_finalists_cls.py)
  # reads only pretrain_epochs and ignores pretrain_iters, so it still uses
  # epoch-based training with val-best checkpointing as intended.
  HAR:          { pretrain_iters: 600, pretrain_epochs: 40 }
  Epilepsy:     { pretrain_iters: 600, pretrain_epochs: 40 }
  SleepEEG:     { pretrain_iters: 600, pretrain_epochs: 40 }
  Gesture:      { pretrain_iters: 600, pretrain_epochs: 40 }
  NATOPS:       { pretrain_iters: 600, pretrain_epochs: 40 }
  # ── Anomaly detection (epoch-based) ──────────────────────────────────────
  Yahoo:        { pretrain_epochs: 40 }
  KPI:          { pretrain_epochs: 40 }

comparator:
  # T-CLSC training config.  See search/pretrain_comparator.py for the
  # full key reference.
  #
  # Values aligned with AutoCTS++ (random_search.py L28,29,41,538):
  #   batch_size=64, lr=1e-4, epochs=100, tolerance=3 (we allow patience=5
  #   because our valid sets are larger after the symmetric-pair injection).
  epochs: 100               # upper bound — real stop is triggered by ``patience``
  lr: 0.0001
  batch_size: 64
  hidden_dim: 128

  # Rev 2026-05-16 — hold-out switched from ExchangeRate to ETTm2 after
  # the 2026-05-13 run revealed two compounding issues that produced a
  # near-zero ρ on the clean-only valid pool (BCE=0.9347, acc=0.507,
  # ρ=+0.011):
  #
  #   (a) ExchangeRate is the ONLY finance source in the 9-source pool;
  #       its near-random-walk dynamics make optimal CL strategies
  #       qualitatively different from the other 8 (ETT/Solar/traffic/AQ
  #       all have strong periodicity).  Hold-out had no same-domain
  #       neighbour in train → cross-domain generalisation, not the
  #       in-distribution generalisation the comparator was meant to learn.
  #
  #   (b) The seedgen log (result/zac_array_seedgen_43760_4) showed 5/9
  #       ExchangeRate sub-tasks with noisy↔clean ρ < 0.3 [FAIL] (mean ρ
  #       ≈ +0.27).  Even with ``valid_clean_only: true`` reading just
  #       the clean portion (7830/64710 pairs), the underlying source's
  #       label instability suggests forecasting on this dataset is
  #       intrinsically high-variance — making it a poor unit test for
  #       comparator quality.
  #
  # ETTm2 is a fairer hold-out:
  #   • Two same-domain neighbours in train (ETTh2 + ETTm1) → tests the
  #     in-domain generalisation the comparator can actually achieve,
  #     separating "comparator broken" from "ExchangeRate genuinely OOD".
  #   • 9 sub-tasks (same as ExchangeRate had), so valid pair count is
  #     directly comparable to the previous baseline.
  #   • Strong periodicity (15-min ETT) → noisy ρ likely PASS, but with
  #     ``valid_clean_only: true`` we ignore noisy valid anyway.
  #
  # Decision rule for the next run's valid clean BCE:
  #   < 0.65, ρ > +0.3   → ExchangeRate was the outlier (case a/b).
  #                        Re-run with rotating-CV hold-out or keep ETTm2.
  #   ≈ 0.69, ρ ≈ 0      → comparator has a structural problem
  #                        (task encoder collapse).  Continue to z_task
  #                        diagnostic + PMA k=1→4 / no-seq_len-mean-pool
  #                        per Debug/comparator_bug_2026_05_12.md §4.4.
  #   > 0.75             → both (a/b) AND structural problem stacked.
  #
  # Seeds whose task_id base matches any name in ``valid_sources`` go 100%
  # into valid; all other seeds go 100% into train.  No gap-split is
  # applied — every bucket forms ALL quadratic pairs.
  #
  # Set to ``[]`` to fall back to the legacy per-task gap-split (carves
  # train seeds away into a valid pool by z-score gap).  Not recommended
  # at scale — see ``random_search.py:502`` for the AutoCTS++ rationale
  # behind a held-out source.
  valid_sources: [ETTm2]

  # Used only when ``valid_sources`` is empty (legacy mode).  Half-σ in
  # z-score units — kept for backwards compat with old small-scale runs.
  valid_gap_threshold: 0.5

  # Rev 2026-05-16 — diagnostic: filter valid pool to stage="clean" only.
  # Train pool is NOT filtered.  Motivation: seedgen log for the default
  # hold-out source (ExchangeRate) showed 5/9 sub-tasks with noisy↔clean
  # Spearman ρ < 0.3 [FAIL] (mean ρ ≈ +0.27).  That means ≈88% of the
  # valid pool (the noisy stage = 56880/64710 pairs) carried near-random
  # labels — alone enough to push valid BCE above ln(2) and trigger the
  # P0-3 sanity gate even when the comparator IS learning on the 12%
  # clean portion.  Setting this True isolates the clean signal so we
  # can tell "learning but drowned by bad noisy labels" apart from
  # "genuinely not learning".  Flip back to False after the diagnostic
  # decision is made (and noisy quality is improved or noisy stage is
  # dropped from the offending source).
  valid_clean_only: true

  # Plateau-detection half-width: valid-BCE inside ``ln(2) ± plateau_eps``
  # gets explicitly flagged as "≈ random" in the per-epoch log.  0.02 is
  # tight enough to flag chance-level plateaus without false positives on
  # genuinely-near-random epochs early in training.
  plateau_eps: 0.02

  # Rev 2026-05-16 — bumped 5 → 20.  Previous run's best valid was at
  # ep 1 (lucky init) and patience=5 stopped at ep 6 before training had
  # a chance to escape the initialisation plateau.  20 lets the optimizer
  # work through ~20× the prior budget without runaway cost (each epoch
  # is ~24 min at 345k pairs on A100 / ~30 min on 4090).
  patience: 20              # epochs of non-improvement → early stop
  eval_every: 1             # evaluate valid loss every N epochs

zero_shot:
  n_candidates: 200000      # 200k pool — comparator forward is nearly free on 4090
  top_k: 30                 # 30 fully-trained finalists on the target
  tournament_rounds: 25     # +5 for tighter Swiss-system ranking

encoder_default:
  n_layers: 10
  hidden_dim: 64
  output_dim: 320

# ─────────────────────────────────────────────────────────────────────────────
# Plan B (CLAUDE_ADV.md §3.7) — two-stage decomposition of the joint search.
#
# Stage A : grid-search 36 encoders × |sources| under GGS_STRATEGY → top-K_enc
# Stage B : seed generation + comparator + zero-shot ranking, with the encoder
#           sub-space restricted to top-K_enc
# Phase 4 : Cartesian retrain (K_enc × top_k_strategies) on the target dataset
# ─────────────────────────────────────────────────────────────────────────────
two_stage_search:
  encoder_grid:
    enabled: true
    # Stage A encoder grid — diverse subset of the CL-aligned source pool.
    # One representative per task-feature cluster (ETT-15min, Solar, traffic,
    # AQ, ExchangeRate) so the encoder-capacity ranking generalises across
    # the same domain coverage that seed gen and zero-shot search will see.
    sources: [ETTm1, Solar, traffic, AQShunyi, ExchangeRate]
    save_path: outputs/full_etth1_two_stage/encoder_grid.json
    top_k_enc: 3                # K_enc
    # ── Stage-A-specific cost knobs (used ONLY by run_encoder_grid.py) ──
    # Stage A only needs a stable top-K rank, not full convergence.
    # ``pretrain_iters`` overrides each source's ``dataset_budgets`` value
    # for Stage A only — seed generation (B.1a/b/c) keeps its full budget.
    # 300 iters ≈ half of the 600-iter seed budget; NAS literature shows
    # ranks stabilise well before full convergence.
    pretrain_iters: 300
    # ``eval_horizons`` overrides the canonical [24, 48, 168, 336, 720]
    # used by ``train.evaluate.eval_forecasting``. Dropping H=720 saves
    # the most expensive Ridge fit (target dim H × C_raw is largest there);
    # dropping H=48 removes redundancy with H=24. The remaining
    # [24, 168, 336] still spans short / mid / long range, preserving rank
    # discrimination across encoder capacities.
    eval_horizons: [24, 168, 336]

  cl_strategy_search:
    n_per_dataset: 20           # mirrors seed_generation.n_per_dataset (AutoCTS++ default)
    n_candidates: 200000
    tournament_rounds: 25
    top_k_strategies: 15        # CL strategies kept per encoder (raised from 5
                                # to widen the Phase-4 funnel — compensates for
                                # the comparator being trained on MAE labels
                                # while finalist selection uses MSE.  Spearman
                                # MAE↔MSE rank correlation is ~0.85–0.95, so
                                # MSE-best may sit at MAE-rank 6-15, no longer
                                # at rank 1-5.  15 retrains ≈ 75 min on a 4090,
                                # cheap relative to a full seed-gen rerun.)

  # Phase 4: K_enc × top_k_strategies = 3×5 = 15 retrains.
  # CLAUDE_ADV.md §10.2 originally proposed 3000 iters, but the protocol
  # A/B test (outputs/test_protocol_ab/diff.txt) showed §10.1 alone +
  # 600 iters already reaches mean MSE 0.155 — close to the TS2Vec
  # reference. The 3000-iter budget is now optional and not the default
  # because its marginal gain is small relative to the 5× wall-clock cost.
  finalists:
    pretrain_iters: 600
    pretrain_lr: 0.001
    batch_size: 32              # tracks §10.1 crop_len=3000
