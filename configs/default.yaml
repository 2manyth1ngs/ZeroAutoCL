# ─────────────────────────────────────────────────────────────────────────────
# Paper-level forecasting configuration — tuned for RTX 4090 (24 GB).
#
# VRAM budget notes
# -----------------
# The dominant memory cost comes from temporal / cross-scale contrast, which
# build (B, T', T') similarity matrices.  With max_temporal_len=200 and
# B=32, each matrix is 32×200×200×4 = 5 MB — safe on any modern GPU.
# Without subsampling, T=3000 (crop_len) would create 32×3000×3000×4 = 1.1 GB
# per matrix, causing OOM on 24 GB cards after adding gradients + encoder
# activations.
#
# Instance contrast (time-pools to (B, D) first) is unaffected by T.
# ─────────────────────────────────────────────────────────────────────────────

seed_generation:
  # AutoCTS++-aligned budget (reference/AutoCTS_plusplus/exps/generate_seeds.py
  # uses ``sample_num=20`` as default — 20 clean + 40 noisy per task, total 60).
  # Our previous 200 was ~10× AutoCTS++'s clean-mode count and made paper-scale
  # runs impractical (~50+ hours on one GPU).
  #
  # Two-stage AutoCTS++ protocol, executed as THREE CLI invocations per task:
  #
  #   1. --mode noisy  --n_per_dataset 20  --seed 42     # deterministic init
  #   2. --mode noisy  --n_per_dataset 20  --randomise_init  --seed 43
  #   3. --mode clean  --n_per_dataset 20  --seed 44
  #
  # Yields 60 records per task × 8 source tasks = 480 total (matching AutoCTS++
  # paper scale).  Estimated wall-clock ~15-20 h on a single RTX 4090.
  n_per_dataset_noisy: 20   # per ``--mode noisy`` run (run twice → 40 total)
  n_per_dataset_clean: 20   # single ``--mode clean`` run
  n_per_dataset: 20         # backward-compat fallback when CLI doesn't pass it
  pretrain_epochs: 40       # fallback only (forecasting uses iter budgets)
  pretrain_lr: 0.001
  batch_size: 32
  max_input_length: 2000
  # Sliding-window crop length for seed generation and encoder grid search.
  # Shorter than _FORECAST_WINDOW_LEN (3000) to speed up Stage A/B ~3×.
  # Seed gen only needs relative ranking — shorter crops are an equal bias
  # across all candidates, preserving rank order.  1024 covers ~50% of the
  # 10-layer dilated CNN receptive field (2047), enough for mid-layer layers
  # to contribute meaningful gradients.  Phase 4 retrain still uses 3000.
  crop_len: 1024
  # Cap sequence length for temporal/cross-scale similarity matrices.
  # Keeps peak VRAM well under 24 GB even when temporal=True is sampled.
  max_temporal_len: 200

# AutoCTS++ §3.2.4 task-enrichment knobs for forecasting source datasets.
# Two complementary axes:
#
#   • n_time_windows  — slice each source's full series into N non-overlapping
#                       temporal segments (each segment becomes its own
#                       sub-task with a fresh 80/20 train/val split).
#                       Each window costs one CL pre-training run, so total
#                       compute scales linearly.  Default 1 = no slicing.
#
#   • horizon_groups  — list of horizon sets used at downstream eval time.
#                       Each group emits its own seed record but shares the
#                       CL pre-train, so this axis is essentially free.
#                       null = single canonical [24,48,168,336,720] eval.
#
# Total sub-tasks per source = n_time_windows × len(horizon_groups).
# Total CL pre-trainings per source = n_time_windows × n_per_dataset
# (horizon groups reuse the trained encoder).
forecasting_task_variants:
  n_time_windows: 1
  horizon_groups: null
  min_window_len: 1000        # skip slicing when window < this many timesteps

  # Variable-subsampling axis (mirrors AutoCTS++ dataset_slice.py rate buckets,
  # minus the adjacency-matrix reconstruction — ZeroAutoCL's dilated CNN
  # encoder doesn't consume adjacency).  Wide datasets (PEMS series, 170-883
  # vars) benefit most.  Narrow datasets (ETT in univariate mode = 1 raw var,
  # ExchangeRate = 8) silently skip subsampling when raw_var_count <
  # ``min_var_count``.  Per-source variable indices are deterministic (seeded
  # by ``--seed`` + base dataset name) so seed-gen and comparator pretrain
  # see identical sub-task definitions.
  n_variable_subsets: 1                # 1 = disabled; ≥2 enables subsampling
  var_size_rates: [0.25, 0.5, 0.75]    # fractional bucket centres
  min_var_count: 4                     # skip sources with fewer raw vars

  # Example: 3 windows × 3 var-subsets × 2 horizon-groups = 18 sub-tasks
  # per *wide* source (PEMS), 3 × 1 × 2 = 6 sub-tasks per *narrow* source
  # (ETT univariate, ExchangeRate).
  # n_time_windows: 3
  # n_variable_subsets: 3
  # horizon_groups:
  #   - [24, 48, 168]           # short / mid horizons
  #   - [336, 720]               # long horizons

# Per-dataset training budget (Bug #003a).
#
# Forecasting datasets (ETT*) suffer from train→val→test distribution drift,
# so val-based early stopping is unreliable.  Instead we fix an iter budget
# matching TS2Vec's official recipe (hardware-independent).  When
# ``pretrain_iters`` is set, ``pretrain_epochs`` is ignored.
#
# Classification / anomaly datasets keep epoch-based training and use
# val-best checkpointing (val signal is reliable for them).
#
# Mode-specific budget (AutoCTS++ §3.2.4 cheaper-noisy stage; CLAUDE_ADV
# §12 calibration anchor):
#
#   - ``noisy_pretrain_iters``  : iter budget when ``mode='noisy'``.
#   - ``noisy_pretrain_epochs`` : epoch budget when ``mode='noisy'``.
#
# Either alone is sufficient.  When both keys are absent, noisy mode falls
# back to the base ``pretrain_iters`` / ``pretrain_epochs`` (preserves
# legacy behaviour where noisy and clean shared the same budget).
#
# The 200-iter default is calibrated on ETTh2 (CLAUDE_ADV §12.4):
# Spearman ρ=0.905 / pairwise concordance=0.947 already at ~1 epoch
# (≈ 240 iters).  200 iters is a 3× cost cut vs the 600-iter clean budget
# while staying inside the calibrated regime for ETT-scale data.
# **Per-dataset tuning may still be required for PEMS-scale data** —
# 200 iters at batch 32 on PEMS04 (~10k train samples) is only ~0.6 epoch.
# If a re-calibration shows ρ < 0.6 there, raise to 300-400.
dataset_budgets:
  # ── Forecasting (target pool) ──────────────────────────────────────────────
  ETTh1:        { pretrain_iters: 600, noisy_pretrain_iters: 200 }
  ETTm1:        { pretrain_iters: 600, noisy_pretrain_iters: 200 }
  # ── Forecasting (source pool) ──────────────────────────────────────────────
  ETTh2:        { pretrain_iters: 600, noisy_pretrain_iters: 200 }
  PEMS03:       { pretrain_iters: 600, noisy_pretrain_iters: 200 }
  PEMS04:       { pretrain_iters: 600, noisy_pretrain_iters: 200 }
  # PEMS07 has 883 sensor channels (vs PEMS03's 358, PEMS04's 307,
  # PEMS08's 170) — two independent OOM modes:
  #
  #   1. GPU: (B, T, C) input alone is ~116 MB at the global crop_len=1024,
  #      and the CL augmentations + encoder activations push peak VRAM past
  #      24 GB on a 4090.  ``crop_len: 512`` halves activation memory while
  #      preserving rank order (a uniform bias across candidates).
  #
  #   2. CPU: ``eval_forecasting`` builds an ``(N≈17000, H × 883)`` numpy
  #      target per horizon.  At H=720 that's ~43 GB; at H=336 ~20 GB; with
  #      Ridge α-search internal copies, the H=720 path alone OOM-kills a
  #      96 GB SLURM allocation.  ``eval_horizons: [24, 48, 168]`` drops the
  #      two largest targets, cutting peak CPU memory by ~60 GB while
  #      keeping short + mid range for rank discrimination (same precedent
  #      as ``two_stage_search.encoder_grid.eval_horizons``).
  PEMS07:       { pretrain_iters: 600, noisy_pretrain_iters: 200,
                  crop_len: 512, eval_horizons: [24, 48, 168] }
  PEMS08:       { pretrain_iters: 600, noisy_pretrain_iters: 200 }
  PEMS-BAY:     { pretrain_iters: 600, noisy_pretrain_iters: 200 }
  ExchangeRate: { pretrain_iters: 600, noisy_pretrain_iters: 200 }
  # ── Classification (iter-based for Stage A / B, epoch-based only in Phase 4) ─
  # SleepEEG has ~23k train samples vs Epilepsy's ~250; epoch-based budgets
  # cause 90× iteration disparity (Bug #006).  Iter-based budgets normalise
  # wall-clock cost across datasets.  Phase 4 (run_phase4_finalists_cls.py)
  # reads only pretrain_epochs and ignores pretrain_iters, so it still uses
  # epoch-based training with val-best checkpointing as intended.
  HAR:          { pretrain_iters: 600, pretrain_epochs: 40, noisy_pretrain_iters: 200 }
  Epilepsy:     { pretrain_iters: 600, pretrain_epochs: 40, noisy_pretrain_iters: 200 }
  SleepEEG:     { pretrain_iters: 600, pretrain_epochs: 40, noisy_pretrain_iters: 200 }
  Gesture:      { pretrain_iters: 600, pretrain_epochs: 40, noisy_pretrain_iters: 200 }
  NATOPS:       { pretrain_iters: 600, pretrain_epochs: 40, noisy_pretrain_iters: 200 }
  # ── Anomaly detection (epoch-based) ──────────────────────────────────────
  # Calibration didn't cover anomaly detection; leaving noisy at base budget
  # until a separate calibration anchors the 1/3-cut decision.
  Yahoo:        { pretrain_epochs: 40 }
  KPI:          { pretrain_epochs: 40 }

comparator:
  # Stage 1 (pretrain / noisy seeds) config.  See
  # search/pretrain_comparator.py for the full key reference.
  #
  # Values aligned with AutoCTS++ (random_search.py L28,29,41,538):
  #   batch_size=64, lr=1e-4, epochs=100, tolerance=3 (we allow patience=5
  #   because our valid sets are larger after the symmetric-pair injection).
  epochs: 100               # upper bound — real stop is triggered by ``patience``
  lr: 0.0001
  batch_size: 64
  hidden_dim: 128
  valid_gap_threshold: 0.02 # P0: gap used to split valid from train seeds
  patience: 5               # P0: epochs of non-improvement → early stop
  eval_every: 1             # P0: evaluate valid loss every N epochs
  # NOTE: ``curriculum_levels`` is deprecated (P0 removed the gap-magnitude
  # curriculum).  The curriculum now lives in the two-stage noisy→clean
  # protocol; the 'comparator_clean' block below configures stage 2.

# Stage 2 (fine-tune / clean seeds) config — only consulted by
# ``run_pretrain_comparator.py`` when ``--clean_seeds_path`` is supplied.
# Any key omitted here inherits from ``comparator:`` above; the defaults
# when this whole block is absent are ``lr := 0.1 × comparator.lr`` and
# ``epochs := comparator.epochs // 2``.
#
# comparator_clean:
#   lr: 1.0e-5
#   epochs: 100
#   patience: 8

zero_shot:
  n_candidates: 200000      # 200k pool — comparator forward is nearly free on 4090
  top_k: 30                 # 30 fully-trained finalists on the target
  tournament_rounds: 25     # +5 for tighter Swiss-system ranking

encoder_default:
  n_layers: 10
  hidden_dim: 64
  output_dim: 320

# ─────────────────────────────────────────────────────────────────────────────
# Plan B (CLAUDE_ADV.md §3.7) — two-stage decomposition of the joint search.
#
# Stage A : grid-search 36 encoders × |sources| under GGS_STRATEGY → top-K_enc
# Stage B : seed generation + comparator + zero-shot ranking, with the encoder
#           sub-space restricted to top-K_enc
# Phase 4 : Cartesian retrain (K_enc × top_k_strategies) on the target dataset
# ─────────────────────────────────────────────────────────────────────────────
two_stage_search:
  encoder_grid:
    enabled: true
    sources: [PEMS03, PEMS04, PEMS07, PEMS08, ExchangeRate, ETTm1]
    save_path: outputs/full_etth1_two_stage/encoder_grid.json
    top_k_enc: 3                # K_enc
    # ── Stage-A-specific cost knobs (used ONLY by run_encoder_grid.py) ──
    # Stage A only needs a stable top-K rank, not full convergence.
    # ``pretrain_iters`` overrides each source's ``dataset_budgets`` value
    # for Stage A only — seed generation (B.1a/b/c) keeps its full budget.
    # 300 iters ≈ half of the 600-iter seed budget; NAS literature shows
    # ranks stabilise well before full convergence.
    pretrain_iters: 300
    # ``eval_horizons`` overrides the canonical [24, 48, 168, 336, 720]
    # used by ``train.evaluate.eval_forecasting``. Dropping H=720 saves
    # the most expensive Ridge fit (target dim H × C_raw is largest there);
    # dropping H=48 removes redundancy with H=24. The remaining
    # [24, 168, 336] still spans short / mid / long range, preserving rank
    # discrimination across encoder capacities.
    eval_horizons: [24, 168, 336]

  cl_strategy_search:
    n_per_dataset: 20           # mirrors seed_generation.n_per_dataset (AutoCTS++ default)
    n_candidates: 200000
    tournament_rounds: 25
    top_k_strategies: 5         # CL strategies kept per encoder

  # Phase 4: K_enc × top_k_strategies = 3×5 = 15 retrains.
  # CLAUDE_ADV.md §10.2 originally proposed 3000 iters, but the protocol
  # A/B test (outputs/test_protocol_ab/diff.txt) showed §10.1 alone +
  # 600 iters already reaches mean MSE 0.155 — close to the TS2Vec
  # reference. The 3000-iter budget is now optional and not the default
  # because its marginal gain is small relative to the 5× wall-clock cost.
  finalists:
    pretrain_iters: 600
    pretrain_lr: 0.001
    batch_size: 32              # tracks §10.1 crop_len=3000
